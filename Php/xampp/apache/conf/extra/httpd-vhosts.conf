#
# azeroth-universe.eu
#

<VirtualHost *:80>
    DocumentRoot "C:/Servers/WebServers/azeroth-universe.eu"

    ServerName azeroth-universe.eu
    ServerAlias www.azeroth-universe.eu

    <Directory "C:/Servers/WebServers/azeroth-universe.eu">
      Options FollowSymLinks Indexes ExecCGI
      AllowOverride All
      allow from all
      Order allow,deny
      Require all granted
  	</Directory>
</VirtualHost>

<VirtualHost *:443>
    DocumentRoot "C:/Servers/WebServers/azeroth-universe.eu"

    ServerName azeroth-universe.eu
    ServerAlias www.azeroth-universe.eu
	SSLEngine on
	SSLCertificateFile "conf/ssl.crt/server.crt"
	SSLCertificateKeyFile "conf/ssl.key/server.key"
    <Directory "C:/Servers/WebServers/azeroth-universe.eu">
      Options FollowSymLinks Indexes ExecCGI
      AllowOverride All
      allow from all
      Order allow,deny
      Require all granted
  	</Directory>
</VirtualHost>

Alias /universe_client/ "C:/Servers/WebServers/azeroth-universe.eu/universe_client/"
<Directory "C:/Servers/WebServers/azeroth-universe.eu/universe_client/">
    Options Indexes FollowSymLinks
    AllowOverride None
    Require all granted
    Header set Access-Control-Allow-Origin "*"
</Directory>
